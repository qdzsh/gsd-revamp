name: npm Publish

# Manual, trusted publishing workflow for the gsd-revamp CLI and its native
# platform packages. This is the single entry point for shipping a release to
# npm: it builds the Rust engine for every supported platform, publishes each
# @gsd-revamp/engine-* package, then builds and publishes the root package.
#
# Trigger it from the Actions tab ("Run workflow"). Set `dry_run: true` first to
# validate the whole pipeline without pushing anything to npm.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.0.1 or 1.1.0-next.0). Leave blank to use the version already in package.json."
        required: false
        default: ""
        type: string
      dist_tag:
        description: "npm dist-tag. 'auto' picks 'next' for -next.* prereleases, otherwise 'latest'."
        required: false
        default: "auto"
        type: choice
        options:
          - "auto"
          - "latest"
          - "next"
      publish_auth:
        description: "npm publish auth mode. 'trusted' uses OIDC (no secret); 'token' uses the NPM_TOKEN secret."
        required: false
        default: "trusted"
        type: choice
        options:
          - "trusted"
          - "token"
      dry_run:
        description: "Run every step but pass --dry-run to npm publish (nothing is actually published)."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC)

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            platform: darwin-arm64
          - os: macos-14
            target: x86_64-apple-darwin
            platform: darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64-gnu
            cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32-x64-msvc

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust compilation target
        run: rustup target add ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: native-${{ matrix.platform }}
          workspaces: |
            native -> target

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build native addon
        working-directory: native/crates/engine
        env:
          # CARGO_ENCODED_RUSTFLAGS overrides target-specific rustflags in
          # .cargo/config.toml, which sets -C target-cpu=native for dev builds.
          # CI must produce portable binaries.
          CARGO_ENCODED_RUSTFLAGS: ""
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && 'aarch64-linux-gnu-gcc' || '' }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts
          cp native/target/${{ matrix.target }}/release/libgsd_engine.dylib artifacts/gsd_engine.node 2>/dev/null || \
          cp native/target/${{ matrix.target }}/release/libgsd_engine.so artifacts/gsd_engine.node 2>/dev/null || \
          { echo "::error::No library found for ${{ matrix.platform }}"; exit 1; }
          ls -la artifacts/

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir artifacts
          copy native\target\${{ matrix.target }}\release\gsd_engine.dll artifacts\gsd_engine.node

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: artifacts/gsd_engine.node
          if-no-files-found: error

  publish:
    needs: build
    # npm trusted publishing requires GitHub-hosted runners for OIDC.
    runs-on: ubuntu-latest
    name: Publish to npm
    env:
      DRY_RUN: ${{ github.event.inputs.dry_run }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Verify npm publish toolchain
        run: |
          node -e "const [major, minor] = process.versions.node.split('.').map(Number); if (major < 22 || (major === 22 && minor < 14)) { throw new Error('npm trusted publishing requires Node >= 22.14.0'); }"
          node -e "const v=require('child_process').execSync('npm --version',{encoding:'utf8'}).trim().split('.').map(Number); if (v[0] < 11 || (v[0] === 11 && v[1] < 5) || (v[0] === 11 && v[1] === 5 && v[2] < 1)) { throw new Error('npm trusted publishing requires npm >= 11.5.1'); }"

      - name: Select npm publish auth
        run: |
          if [ "${{ github.event.inputs.publish_auth || 'trusted' }}" = "token" ]; then
            echo "Using NPM_TOKEN for npm publish."
          else
            echo "Using npm trusted publishing (OIDC) for npm publish."
          fi

      - name: Set release version
        if: github.event.inputs.version != ''
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "Setting root package version to ${VERSION}"
          npm version "${VERSION}" --no-git-tag-version --allow-same-version

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Copy binaries to platform packages
        run: |
          for platform in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu win32-x64-msvc; do
            cp "artifacts/native-${platform}/gsd_engine.node" "native/npm/${platform}/gsd_engine.node"
            echo "Copied binary for ${platform}"
            ls -la "native/npm/${platform}/"
          done

      - name: Sync platform package versions
        run: node native/scripts/sync-platform-versions.cjs

      - name: Resolve dist-tag
        id: version-check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          CHOICE="${{ github.event.inputs.dist_tag || 'auto' }}"
          if [ "$CHOICE" = "auto" ]; then
            if echo "$VERSION" | grep -q '-next\.'; then
              TAG="next"
            else
              TAG="latest"
            fi
          else
            TAG="$CHOICE"
          fi
          if [ "$TAG" = "latest" ]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_flag=--tag ${TAG}" >> "$GITHUB_OUTPUT"
          echo "Publishing ${VERSION} with dist-tag '${TAG}' (dry_run=${DRY_RUN})"

      - name: Resolve dry-run flag
        id: dry
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            echo "flag=--dry-run" >> "$GITHUB_OUTPUT"
            echo "DRY RUN — nothing will actually be published."
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ github.event.inputs.publish_auth == 'token' && secrets.NPM_TOKEN || '' }}
        run: |
          for platform in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu win32-x64-msvc; do
            echo "Publishing @gsd-revamp/engine-${platform}..."
            cd "native/npm/${platform}"
            if OUTPUT=$(npm publish --access public ${{ steps.version-check.outputs.tag_flag }} ${{ steps.dry.outputs.flag }} 2>&1); then
              echo "$OUTPUT"
            else
              if echo "$OUTPUT" | grep -q "cannot publish over the previously published"; then
                echo "Already published, skipping"
              else
                echo "::error::Failed to publish ${platform}: $OUTPUT"
                exit 1
              fi
            fi
            cd "$GITHUB_WORKSPACE"
          done

      - name: Verify platform packages are published
        if: env.DRY_RUN != 'true'
        run: |
          VERSION="${{ steps.version-check.outputs.version }}"
          echo "Verifying platform packages at version ${VERSION}..."
          # Brand-new scope packages can take several minutes to become visible
          # on the read API after publish. Use a generous window (12 attempts,
          # ~5 minutes) so a fresh first publish doesn't fail on propagation lag.
          DELAY=5
          for attempt in $(seq 1 12); do
            FAILED=0
            for platform in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu win32-x64-msvc; do
              PKG="@gsd-revamp/engine-${platform}"
              PUBLISHED=$(npm view "${PKG}@${VERSION}" version 2>/dev/null || echo "")
              if [ "${PUBLISHED}" != "${VERSION}" ]; then
                FAILED=1
                break
              fi
            done
            if [ "${FAILED}" = "0" ]; then
              echo "All platform packages verified (attempt ${attempt})."
              break
            fi
            if [ "$attempt" = "12" ]; then
              echo "::error::One or more platform packages not found after 12 attempts. Aborting."
              for platform in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu win32-x64-msvc; do
                PKG="@gsd-revamp/engine-${platform}"
                PUBLISHED=$(npm view "${PKG}@${VERSION}" version 2>/dev/null || echo "")
                if [ "${PUBLISHED}" = "${VERSION}" ]; then
                  echo "  ✓ ${PKG}@${VERSION}"
                else
                  echo "  ✗ ${PKG}@${VERSION} (got: '${PUBLISHED}')"
                fi
              done
              exit 1
            fi
            echo "  Attempt ${attempt}: not all packages visible yet, retrying in ${DELAY}s..."
            sleep "$DELAY"
            DELAY=$((DELAY * 2))
            if [ "$DELAY" -gt 30 ]; then DELAY=30; fi
          done

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Build
        run: npm run build

      - name: Verify dist exists
        run: test -s dist/loader.js || { echo "::error::dist/loader.js missing or empty after build"; exit 1; }

      - name: Validate package is installable
        run: npm run validate-pack

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ github.event.inputs.publish_auth == 'token' && secrets.NPM_TOKEN || '' }}
        run: |
          # --ignore-scripts: skip prepublishOnly since we built explicitly above
          if OUTPUT=$(npm publish --ignore-scripts ${{ steps.version-check.outputs.tag_flag }} ${{ steps.dry.outputs.flag }} 2>&1); then
            echo "$OUTPUT"
          else
            if echo "$OUTPUT" | grep -q "cannot publish over the previously published\|You cannot publish over"; then
              echo "Already published, skipping"
            else
              echo "$OUTPUT"
              exit 1
            fi
          fi

      - name: Post-publish smoke test
        if: env.DRY_RUN != 'true'
        run: |
          VERSION="${{ steps.version-check.outputs.version }}"
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"
          npm init -y > /dev/null 2>&1

          echo "Waiting for gsd-revamp@${VERSION} to appear on npm..."
          DELAY=5
          for attempt in $(seq 1 8); do
            PUBLISHED=$(npm view "gsd-revamp@${VERSION}" version 2>/dev/null || echo "")
            if [ "${PUBLISHED}" = "${VERSION}" ]; then
              echo "  ✓ Version ${VERSION} visible on npm (attempt ${attempt})"
              break
            fi
            if [ "$attempt" = "8" ]; then
              echo "::warning::gsd-revamp@${VERSION} not visible on npm after 8 attempts — skipping smoke test"
              exit 0
            fi
            echo "  Attempt ${attempt}: not yet visible, retrying in ${DELAY}s..."
            sleep "$DELAY"
            DELAY=$((DELAY * 2))
            if [ "$DELAY" -gt 30 ]; then DELAY=30; fi
          done

          echo "Installing gsd-revamp@${VERSION}..."
          DELAY=5
          for attempt in 1 2 3; do
            if npm install "gsd-revamp@${VERSION}" 2>&1 | tee /tmp/install-output.txt; then
              echo "  ✓ Install succeeded"
              RAW=$(node node_modules/gsd-revamp/dist/loader.js --version 2>&1 || echo "FAILED")
              ACTUAL=$(echo "$RAW" | sed 's/\x1b\[[0-9;]*m//g' | grep -oE "^${VERSION}$" | head -1)
              if [ "$ACTUAL" = "$VERSION" ]; then
                echo "  ✓ gsd --version = ${VERSION}"
                echo "Published package is functional"
                exit 0
              else
                echo "::error::Version mismatch: expected ${VERSION} in output:"
                echo "$RAW"
                exit 1
              fi
            fi
            echo "Install attempt ${attempt}/3 failed, retrying in ${DELAY}s..."
            cat /tmp/install-output.txt
            sleep "$DELAY"
            DELAY=$((DELAY * 2))
          done
          echo "::error::Smoke test failed — gsd-revamp@${VERSION} not installable"
          exit 1

      - name: Verify dist-tag after publish
        if: env.DRY_RUN != 'true' && steps.version-check.outputs.is_prerelease == 'false'
        run: |
          VERSION="${{ steps.version-check.outputs.version }}"
          echo "Verifying npm dist-tag 'latest' points to ${VERSION}..."
          DELAY=5
          for attempt in $(seq 1 6); do
            LATEST=$(npm view gsd-revamp dist-tags.latest 2>/dev/null || echo "")
            if [ "${LATEST}" = "${VERSION}" ]; then
              echo "  ✓ npm dist-tags.latest = ${VERSION}"
              exit 0
            fi
            echo "  Attempt ${attempt}/6: latest=${LATEST}, expected=${VERSION}, retrying in ${DELAY}s..."
            sleep "$DELAY"
            DELAY=$((DELAY * 2))
            if [ "$DELAY" -gt 30 ]; then DELAY=30; fi
          done
          echo "::error::dist-tags.latest is '${LATEST}' but expected '${VERSION}' — run: npm dist-tag add gsd-revamp@${VERSION} latest"
          exit 1
